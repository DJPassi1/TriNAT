const fbApp = initializeApp(firebaseConfig);

// ── Globale Hilfsfunktionen für die App ─────────────────────────

window.__fbSaveItem = async (collection, id, data) => {
  try {
    await set(ref(db, `trinat/${collection}/${id}`), JSON.parse(JSON.stringify(data)));
  } catch(e) { console.error("Firebase SaveItem Fehler:", e); }
};

// ── Einzelnen Datensatz löschen ──
window.__fbDeleteItem = async (path, id) => {
  try {
    const fullPath = id ? `trinat/${path}/${id}` : `trinat/${path}`;
    await set(ref(db, fullPath), null);
  } catch(e) { console.error("Firebase DeleteItem Fehler:", e); }
};

// ── Einfache Werte speichern (darkMode, version, beiblatt pro User) ──
window.__fbSaveValue = async (path, value) => {
  try {
    await set(ref(db, `trinat/${path}`), JSON.parse(JSON.stringify(value)));
  } catch(e) { console.error("Firebase SaveValue Fehler:", e); }
};

// ── Alles laden ──
// Firebase gibt Objekte zurück, App erwartet Arrays → konvertieren
function fbToArrays(d) {
  if (!d) return null;
  const toArr = v => v && typeof v === 'object' && !Array.isArray(v) ? Object.values(v) : (v || []);
  return {
    ...d,
    users:       toArr(d.users),
    routes:      toArr(d.routes),
    brakeEvents: toArr(d.brakeEvents),
    trainRuns:   Array.isArray(d.trainRuns) ? d.trainRuns : toArr(d.trainRuns),
    beiblatt:    d.beiblatt && typeof d.beiblatt === 'object' ? d.beiblatt : {},
    // Lokale Werte nie aus Firebase übernehmen
    darkMode:    localStorage.getItem('trinat_darkmode') === 'true',
    currentUserId: sessionStorage.getItem('trinat_uid') || null,
  };
}

window.__fbLoad = () => new Promise((resolve) => {
  get(DATA_REF).then(snap => {
    resolve(snap.exists() ? fbToArrays(snap.val()) : null);
  }).catch(() => resolve(null));
});

// ── Echtzeit-Listener ──
window.__fbListen = (callback) => {
  onValue(DATA_REF, (snap) => {
    if (snap.exists()) callback(fbToArrays(snap.val()));
  });
};

// ── Legacy __fbSave wird nicht mehr genutzt, nur als Fallback ──
window.__fbSave = async (state) => {
  // Wird durch granulare Methoden ersetzt – kein globales Überschreiben mehr
};

// ── App erst starten, wenn Firebase bereit ist ───────────────────
window.__firebaseReady = true;
document.dispatchEvent(new Event("firebase-ready"));

openZB(uid){let z=this.s.beiblatt[uid]||Store.blankZB();let bg=this.modal('Zusatzbescheinigung bearbeiten',`<div class="hint"><b>Fahrzeuge Nr. 7:</b> Oberkategorie wählen und dazu die erlaubten Baureihen eintragen.</div><label>Fahrzeuggruppen</label><div id="vlist">${(z.vehicleGroups.length?z.vehicleGroups:[{}]).map(g=>this.vrow(g)).join('')}</div><button type="button" class="btn sec" id="addv">➕ Fahrzeuggruppe hinzufügen</button><label>Betriebsverfahren / Infrastruktur Nr. 8</label>${checks('zi',C.infra,z.infra)}<label>Zugbeeinflussung</label>${checks('zt',C.tc,z.tc)}<label>Signalsysteme</label>${checks('zs',C.sig,z.signals)}`,w=>{let vehicleGroups=[...w.querySelectorAll('.vrow')].map(r=>({type:r.querySelector('.vt').value.trim(),numbers:r.querySelector('.vn').value.trim()})).filter(g=>g.type||g.numbers);if(vehicleGroups.some(g=>!g.type||!g.numbers)){this.toast('Bitte Kategorie und Baureihen je Fahrzeuggruppe eintragen.');return false}this.s.beiblatt[uid]={vehicleGroups,infra:checked(w,'zi'),tc:checked(w,'zt'),signals:checked(w,'zs')};this.saveZB(uid,this.s.beiblatt[uid]);Store.save(this.s);this.beiblatt();this.toast('Zusatzbescheinigung gespeichert')});let wire=()=>bg.querySelectorAll('[data-rv]').forEach(b=>b.onclick=()=>{let rows=bg.querySelectorAll('.vrow');if(rows.length>1)b.closest('.vrow').remove();else{b.closest('.vrow').querySelector('.vt').value='';b.closest('.vrow').querySelector('.vn').value=''}});wire();bg.querySelector('#addv').onclick=()=>{bg.querySelector('#vlist').insertAdjacentHTML('beforeend',this.vrow({}));wire()}}
openRoute(id){let r=id?this.s.routes.find(x=>x.id===id):{userId:this.u.id,name:'',from:'',to:'',createdAt:today(),lastRun:'',notes:''};let sel=this.u.role==='admin'?`<label>Tf</label><select id="mu">${this.tfs.map(t=>`<option value="${t.id}" ${t.id===r.userId?'selected':''}>${E(t.name)}</option>`).join('')}</select>`:'';this.modal(id?'Streckenkenntnis bearbeiten':'Streckenkenntnis anlegen',`${sel}<label>Streckenname</label><input id="mn" value="${A(r.name)}"><label>Bahnhöfe <span style="font-weight:400;font-size:12px">(einen pro Zeile, von oben nach unten)</span></label><textarea id="mstops" rows="5" style="font-family:inherit">${(r.stops&&r.stops.length?r.stops:['','']).join('\n')}</textarea><div class="form"><div><label>Angelegt</label><input id="mc" type="date" value="${A(r.createdAt)}"></div><div><label>Letzte Fahrt</label><input id="ml" type="date" value="${A(r.lastRun)}"></div></div><label>Notiz</label><input id="mno" value="${A(r.notes)}">`,w=>{let stops=VI(w,'mstops').split('\n').map(x=>x.trim()).filter(Boolean);if(stops.length<2){this.toast('Mindestens 2 Bahnhöfe angeben.');return false}let d={userId:this.u.role==='admin'?w.querySelector('#mu').value:this.u.id,name:VI(w,'mn')||stops[0]+' – '+stops[stops.length-1],from:stops[0],to:stops[stops.length-1],stops,createdAt:VI(w,'mc'),lastRun:VI(w,'ml'),notes:VI(w,'mno')};if(!d.createdAt){this.toast('Anlagedatum fehlt.');return false}let savedRoute=id?Object.assign(r,d):{id:crypto.randomUUID(),...d};if(!id)this.s.routes.push(savedRoute);this.saveRoute(savedRoute);Store.save(this.s);this.routes();this.toast('Streckenkenntnis gespeichert')})}openRuns(){this.modal('Zuglauf-Daten verwalten',`<div class="hint">Format: Zugnummer | Halt 1 > Halt 2 > Halt 3</div><textarea id="rt">${this.s.trainRuns.map(r=>`${r.trainNo} | ${r.stops.join(' > ')}`).join('\n')}</textarea>`,w=>{this.s.trainRuns=VI(w,'rt').split('\n').map(x=>x.trim()).filter(Boolean).map(l=>{let [no,st]=l.split('|');return{id:crypto.randomUUID(),trainNo:(no||'').trim(),stops:(st||'').split('>').map(x=>x.trim()).filter(Boolean)}}).filter(r=>r.trainNo&&r.stops.length>1);this.saveTrainRuns();Store.save(this.s);this.routes();this.toast('Zugläufe gespeichert')})}openBrake(id){let e=id?this.s.brakeEvents.find(x=>x.id===id):{userId:this.u.id,date:'',reason:'',vehicle:'',trainNo:''};let pick=this.u.role==='admin'?`<label>Tf</label><select id="mu">${this.tfs.map(t=>`<option value="${t.id}" ${t.id===e.userId?'selected':''}>${E(t.name)}</option>`).join('')}</select>`:'';this.modal(id?'Bremsereignis bearbeiten':'Bremsereignis anlegen',`${pick}<label>Datum</label><input id="bd" type="date" value="${A(e.date)}"><label>Grund</label><input id="br" value="${A(e.reason)}"><label>Fahrzeug / Kategorie</label><input id="bv" value="${A(e.vehicle)}"><label>Zugnummer</label><input id="bt" value="${A(e.trainNo)}">`,w=>{let d={userId:this.u.role==='admin'?w.querySelector('#mu').value:this.u.id,date:VI(w,'bd'),reason:VI(w,'br'),vehicle:VI(w,'bv'),trainNo:VI(w,'bt')};if(!d.date||!d.reason||!d.vehicle||!d.trainNo){this.toast('Alle Felder sind Pflicht.');return false}let savedBrake=id?Object.assign(e,d):{id:crypto.randomUUID(),...d};if(!id)this.s.brakeEvents.push(savedBrake);this.saveBrake(savedBrake);Store.save(this.s);this.brakes();this.toast('Gespeichert')})}openUser(id){let u=id?this.s.users.find(x=>x.id===id):{name:'',tfNumber:'',station:''};this.modal(id?'Tf bearbeiten':'Tf anlegen',`<label>Name</label><input id="un" value="${A(u.name)}"><label>Tf-Nummer</label><input id="ut" value="${A(u.tfNumber)}"><label>Dienststelle</label><input id="us" value="${A(u.station)}">`,w=>{let name=VI(w,'un'),tf=VI(w,'ut'),station=VI(w,'us');if(!name||!tf){this.toast('Name und Tf-Nummer sind Pflicht.');return false}if(id){Object.assign(u,{name,username:name,password:tf,tfNumber:tf,station,role:'tf'});this.saveUser(u)}else{let nu={id:crypto.randomUUID(),name,username:name,password:tf,tfNumber:tf,station,role:'tf'};this.s.users.push(nu);this.s.beiblatt[nu.id]=Store.blankZB();this.saveUser(nu);this.saveZB(nu.id,this.s.beiblatt[nu.id])}Store.save(this.s);this.dispatcher();this.toast('Mitarbeiter gespeichert')})}del(type,id){let n={route:'Streckenkenntnis',brake:'Bremsereignis',user:'Mitarbeiter'}[type];if(!confirm(`${n} wirklich löschen?`))return;if(type==='route'){this.s.routes=this.s.routes.filter(r=>r.id!==id);this.deleteItem('routes',id)}if(type==='brake'){this.s.brakeEvents=this.s.brakeEvents.filter(e=>e.id!==id);this.deleteItem('brakeEvents',id)}if(type==='user'){this.s.routes.filter(r=>r.userId===id).forEach(r=>this.deleteItem('routes',r.id));this.s.brakeEvents.filter(e=>e.userId===id).forEach(e=>this.deleteItem('brakeEvents',e.id));this.deleteItem('beiblatt/'+id,'');this.deleteItem('users',id);this.s.users=this.s.users.filter(u=>u.id!==id);this.s.routes=this.s.routes.filter(r=>r.userId!==id);this.s.brakeEvents=this.s.brakeEvents.filter(e=>e.userId!==id);delete this.s.beiblatt[id]}Store.save(this.s);this.renderView();this.toast('Gelöscht')}userName(id){return(this.s.users.find(u=>u.id===id)||{}).name||'Unbekannt'}}

// ── Asynchroner App-Start mit Firebase ─────────────────────────
async function startApp() {
  const state = await Store.loadAsync();
  const app = new App(state);
  // Echtzeit-Listener: aktualisiert App wenn ein anderes Gerät speichert
  if (window.__fbListen) {
    window.__fbListen((remoteState) => {
      // Nur aktualisieren wenn kein Modal offen ist (vermeidet Unterbrechungen)
      if (!document.querySelector('.modalbg')) {
        let uid=sessionStorage.getItem('trinat_uid')||null;let dm=localStorage.getItem('trinat_darkmode')==='true';Object.assign(app.s,Store.mig(remoteState));app.s.currentUserId=uid;app.s.darkMode=dm;
        app.renderView();
      }
    });
  }
}

function bootstrap() {
  startApp();
}

if (window.__firebaseReady) {
  bootstrap();
} else {
  document.addEventListener('firebase-ready', bootstrap, { once: true });
  // Fallback: nach 3s ohne Firebase trotzdem starten (localStorage)
  setTimeout(() => { if (!window.__firebaseReady) bootstrap(); }, 3000);
}

</script></body></html>
